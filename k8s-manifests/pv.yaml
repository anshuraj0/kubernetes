apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongodb-pv
  namespace: mongodb
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: gp2
  accessModes:
    - ReadWriteOnce
  gcePersistentDisk:
    pdName: my-disk  # Name of the existing Persistent Disk
    fsType: ext4
  persistentVolumeReclaimPolicy: Retain

